<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0A2E"/>
      <stop offset="100%" stop-color="#1A103D"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="outerglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="out"/>
    </filter>
    <clipPath id="roundRect">
      <rect width="512" height="512" rx="108" ry="108"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <g clip-path="url(#roundRect)">
    <rect width="512" height="512" fill="url(#bg)"/>
    <!-- Subtle radial ambient -->
    <circle cx="256" cy="240" r="220" fill="#7C3AED" opacity="0.06"/>
    <circle cx="280" cy="260" r="160" fill="#06B6D4" opacity="0.05"/>
  </g>

  <g clip-path="url(#roundRect)">
    <!-- Neural network dots (background decoration) -->
    <circle cx="120" cy="130" r="3" fill="#7C3AED" opacity="0.3"/>
    <circle cx="390" cy="110" r="2.5" fill="#06B6D4" opacity="0.25"/>
    <circle cx="400" cy="370" r="3" fill="#8B5CF6" opacity="0.2"/>
    <circle cx="100" cy="390" r="2" fill="#06B6D4" opacity="0.2"/>
    <circle cx="180" cy="90" r="2" fill="#4F46E5" opacity="0.2"/>
    <circle cx="340" cy="420" r="2.5" fill="#7C3AED" opacity="0.15"/>

    <!-- Thin connection lines -->
    <line x1="120" y1="130" x2="180" y2="90" stroke="#7C3AED" stroke-width="0.8" opacity="0.15"/>
    <line x1="390" y1="110" x2="340" y2="420" stroke="#06B6D4" stroke-width="0.6" opacity="0.1"/>
    <line x1="100" y1="390" x2="400" y2="370" stroke="#8B5CF6" stroke-width="0.5" opacity="0.08"/>

    <!-- Main book shape - left page -->
    <path d="M148 340 L148 175 Q148 160 163 155 L240 135 Q250 132 256 135 L256 310 Q250 307 240 310 L168 328 Q148 333 148 340Z"
          fill="url(#glow)" opacity="0.9" filter="url(#softglow)"/>

    <!-- Main book shape - right page -->
    <path d="M364 340 L364 175 Q364 160 349 155 L272 135 Q262 132 256 135 L256 310 Q262 307 272 310 L344 328 Q364 333 364 340Z"
          fill="url(#glow2)" opacity="0.9" filter="url(#softglow)"/>

    <!-- Book spine highlight -->
    <line x1="256" y1="135" x2="256" y2="310" stroke="white" stroke-width="1.5" opacity="0.3"/>

    <!-- AI Brain circuit on left page -->
    <!-- Central node -->
    <circle cx="202" cy="210" r="8" fill="white" opacity="0.9"/>
    <circle cx="202" cy="210" r="4" fill="#0F0A2E" opacity="0.7"/>

    <!-- Branch nodes -->
    <circle cx="178" cy="180" r="5" fill="white" opacity="0.7"/>
    <circle cx="228" cy="185" r="5" fill="white" opacity="0.7"/>
    <circle cx="185" cy="245" r="5" fill="white" opacity="0.7"/>
    <circle cx="220" cy="240" r="4.5" fill="white" opacity="0.6"/>
    <circle cx="170" cy="215" r="4" fill="white" opacity="0.5"/>
    <circle cx="232" cy="215" r="4" fill="white" opacity="0.5"/>

    <!-- Neural connections -->
    <line x1="202" y1="210" x2="178" y2="180" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <line x1="202" y1="210" x2="228" y2="185" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <line x1="202" y1="210" x2="185" y2="245" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <line x1="202" y1="210" x2="220" y2="240" stroke="white" stroke-width="1.4" opacity="0.4"/>
    <line x1="202" y1="210" x2="170" y2="215" stroke="white" stroke-width="1.2" opacity="0.4"/>
    <line x1="202" y1="210" x2="232" y2="215" stroke="white" stroke-width="1.2" opacity="0.4"/>
    <line x1="178" y1="180" x2="170" y2="215" stroke="white" stroke-width="1" opacity="0.25"/>
    <line x1="228" y1="185" x2="232" y2="215" stroke="white" stroke-width="1" opacity="0.25"/>
    <line x1="185" y1="245" x2="220" y2="240" stroke="white" stroke-width="1" opacity="0.25"/>

    <!-- Right page: text/content lines -->
    <rect x="274" y="175" width="68" height="3" rx="1.5" fill="white" opacity="0.35"/>
    <rect x="274" y="192" width="55" height="3" rx="1.5" fill="white" opacity="0.25"/>
    <rect x="274" y="209" width="62" height="3" rx="1.5" fill="white" opacity="0.3"/>
    <rect x="274" y="226" width="48" height="3" rx="1.5" fill="white" opacity="0.2"/>
    <rect x="274" y="243" width="58" height="3" rx="1.5" fill="white" opacity="0.25"/>
    <rect x="274" y="260" width="40" height="3" rx="1.5" fill="white" opacity="0.2"/>

    <!-- Sparkle / AI indicator -->
    <g transform="translate(330, 145)" opacity="0.8" filter="url(#softglow)">
      <path d="M0 -12 L2.5 -2.5 L12 0 L2.5 2.5 L0 12 L-2.5 2.5 L-12 0 L-2.5 -2.5Z" fill="url(#glow2)"/>
    </g>
    <g transform="translate(155, 148)" opacity="0.5">
      <path d="M0 -7 L1.5 -1.5 L7 0 L1.5 1.5 L0 7 L-1.5 1.5 L-7 0 L-1.5 -1.5Z" fill="#7C3AED"/>
    </g>

    <!-- Bottom glow reflection -->
    <ellipse cx="256" cy="380" rx="120" ry="15" fill="url(#glow)" opacity="0.08"/>
  </g>
</svg>
